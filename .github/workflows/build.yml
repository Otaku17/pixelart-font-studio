name: Build desktop app

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: pixelart-font-studio-darwin-universal
          - os: windows-2022
            artifact_name: pixelart-font-studio-windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev
          fi

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          xcode-select --install || true

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install Wails
        shell: bash
        run: |
          export GOBIN="$HOME/go/bin"
          rm -f "$GOBIN/wails"
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          ls -l "$GOBIN/wails" || true

      - name: Build app
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          export PATH="$HOME/go/bin:$PATH"
          "$HOME/go/bin/wails" build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/

      - name: Create GitHub release
        if: github.event_name == 'release' && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          name: Release ${{ github.event.release.tag_name }}
          draft: false
          prerelease: false
          files: |
            build/bin/*
